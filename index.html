<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="game-info">
                <h1>俄羅斯方塊</h1>
                <div class="info-panel">
                    <div class="info-item">
                        <label>得分</label>
                        <div id="score">0</div>
                    </div>
                    <div class="info-item">
                        <label>等級</label>
                        <div id="level">1</div>
                    </div>
                    <div class="info-item">
                        <label>消行</label>
                        <div id="lines">0</div>
                    </div>
                </div>
                <div class="next-piece-container">
                    <label>下一個方塊</label>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                <div class="button-group">
                    <button id="startBtn" class="btn btn-primary">開始遊戲</button>
                    <button id="pauseBtn" class="btn btn-secondary" disabled>暫停</button>
                    <button id="resetBtn" class="btn btn-danger">重新開始</button>
                </div>
                <div class="controls">
                    <p><strong>操作說明：</strong></p>
                    <p>← → : 左右移動</p>
                    <p>↓ : 下降</p>
                    <p>↑ : 旋轉</p>
                    <p>空格 : 加速下落</p>
                </div>
            </div>
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
